- release_tracks: [ALPHA]
  help_text:
    brief: List BigLake Delta Sharing shares.
    description: |
      List BigLake Delta Sharing shares.
  request:
    collection: biglake.deltasharing.v1.projects.catalogs.shares
    api_version: delta_v1
    method: list
    modify_request_hooks:
    - googlecloudsdk.command_lib.biglake.delta_sharing:SetParentForList
  arguments:
    resource:
      help_text: The catalog to list shares from.
      spec:
        name: catalog
        collection: biglake.deltasharing.v1.projects.catalogs
        attributes:
        - attribute_name: project
          parameter_name: projectsId
          property: core/project
          help: The project.
        - attribute_name: catalog
          parameter_name: catalogsId
          help: The BigQuery catalog ID.
  output:
    format: |
      table(
        name.basename():label=ID,
        userFriendlyName:label=USER_FRIENDLY_NAME
      )
