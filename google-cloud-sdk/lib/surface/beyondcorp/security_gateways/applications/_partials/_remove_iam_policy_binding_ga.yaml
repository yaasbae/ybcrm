- release_tracks: [GA]
  help_text:
    brief: Remove an IAM policy binding from a security gateway application.
    description: |
      Removes an IAM policy binding from the given security gateway application.
    examples: |
      To remove an IAM policy binding for the role of 'roles/beyondcorp.sgApplicationUser' for the user 'test-user@gmail.com'
      on a security gateway application with ID 'my-application':

        $ {command} my-application --member='user:test-user@gmail.com' --role='roles/beyondcorp.sgApplicationUser' --location=global

      See https://cloud.google.com/iam/docs/managing-policies for details on
      policy role and member types.

  request:
    collection: beyondcorp.projects.locations.securityGateways.applications
    GA:
      api_version: v1

  iam:
    set_iam_policy_request_path: googleIamV1SetIamPolicyRequest
    message_type_overrides:
      policy: GoogleIamV1Policy
      set_iam_policy_request: BeyondcorpProjectsLocationsSecurityGatewaysApplicationsSetIamPolicyRequest

  arguments:
    resource:
      help_text: The security gateway application for which to remove the IAM policy binding.
      spec: !REF googlecloudsdk.command_lib.beyondcorp.v1_resources:projects_locations_security_gateways_applications
      is_positional: true
